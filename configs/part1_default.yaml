# Part 1: Camera Pose Initialization Comparison
# Default configuration

# Dataset settings
dataset:
  type: "dl3dv"  # dl3dv, re10k, or waymo
  path: "data/dl3dv-2"

# COLMAP settings
colmap:
  path: "E:/Colmap/COLMAP.bat"
  camera_model: "PINHOLE"
  use_gpu: true

# Foundation Model settings
foundation_model:
  name: "dust3r"  # dust3r or mast3r
  device: "cuda"

# 3DGS Training settings
training:
  iterations: 3000
  lr_xyz: 0.00016
  lr_features: 0.0025
  lr_opacity: 0.05
  lr_scaling: 0.005
  lr_rotation: 0.001
  train_test_split: 0.8

# Output settings
output:
  base_path: "outputs/part1"
  save_visualizations: true
  save_models: true

# Device settings
device: "cuda"
